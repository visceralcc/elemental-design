  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand-cyan: #00C3FF;
    --brand-cyan-deep: #006B99;
    --brand-blue: #0095FF;
    --brand-blue-deep: #0449B8;
    --brand-cyan-hover: #00DDFF;
    --brand-cyan-bright: #01BEF9;
    --brand-cyan-highlight: #01D4F9;
    --brand-cyan-pill: #00B2F3;
    --surface-top-bar: #4B4B4B;
    --surface-agent: #1F1F1F;
    --surface-elements: #373737;
    --surface-code: #2A2A2A;
    --surface-component: #2A2A2A;
    --surface-canvas-light: #2C2C2C;
    --surface-canvas-dark: #161616;
    --surface-tab-el-start: #282828;
    --surface-tab-el-end: #3B3B3B;
    --surface-tab-cv-start: #1C1C1C;
    --surface-tab-cv-end: #2A2A2A;
    --gray-btn-light: #9A9A9A;
    --gray-btn-dark: #515151;
    --gray-mode-inactive: #848484;
    --gray-border: #888888;
    --text-primary: #FFFFFF;
    --text-accent: #01BEF9;
    --text-muted: rgba(255,255,255,0.5);
    --pink-spacing: #f472b6;
  }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--surface-top-bar);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ─── Mode Bar ─── */
  .mode-bar {
    height: 44px;
    min-height: 44px;
    margin: 10px 20px 10px 10px;
    background: var(--surface-top-bar);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    z-index: 100;
  }
  .mode-pills { display: flex; gap: 5px; }
  .mode-pill {
    width: 54px; height: 29px; border-radius: 29px;
    display: flex; align-items: center; justify-content: center;
    border: none; cursor: pointer;
  }
  .mode-pill.active { background: var(--brand-cyan-pill); }
  .mode-pill.inactive { background: var(--gray-mode-inactive); }
  .mode-pill svg { width: 100%; height: 100%; display: block; }
  .wordmark { display: flex; align-items: baseline; gap: 3px; }
  .wordmark-el { font-family: 'Barlow Condensed', sans-serif; font-weight: 500; font-size: 25px; color: var(--text-accent); }
  .wordmark-de { font-family: 'Barlow Condensed', sans-serif; font-weight: 500; font-size: 25px; color: var(--text-primary); }

  /* ─── Panels layout ─── */
  .panels-wrap { flex: 1; display: flex; overflow: hidden; min-height: 0; }

  .panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .panel-agent     { width: 260px; min-width: 200px; flex-shrink: 1; }
  .panel-elements  { width: 260px; min-width: 220px; flex-shrink: 1; }
  .panel-code      { width: 520px; min-width: 520px; flex-shrink: 1; }
  .panel-component { flex: 1; min-width: 400px; }

  /* Tab strip sits at top of each panel; the shared #4B4B4B strip is formed
     by each open panel's tab strip, so they visually form a continuous row. */
  .panel-tab-strip {
    height: 46px; min-height: 46px;
    background: #4B4B4B;
    display: flex; align-items: flex-end;
  }
  .panel-body {
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Panel body backgrounds */
  .panel-agent     .panel-body { background: var(--surface-agent); align-items: center; justify-content: center; gap: 12px; padding: 24px; text-align: center; }
  .panel-elements  .panel-body { background: var(--surface-elements); }
  .panel-code      .panel-body { background: var(--surface-code); }
  .panel-component .panel-body { background: linear-gradient(to bottom, var(--surface-canvas-light), var(--surface-canvas-dark)); }

  /* ─── Tab shapes (sit inside .panel-tab-strip) ─── */
  .panel-tab {
    height: 46px;
    display: flex; align-items: center;
    padding: 0 60px 0 14px;
    gap: 12px;
    font-family: 'Barlow', sans-serif;
    font-size: 16px; font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
  }
  .panel-tab-agent    { background: var(--surface-agent);    border-radius: 0 23px 0 0; }
  .panel-tab-el       { background: var(--surface-elements); border-radius: 23px 23px 0 0; }
  .panel-tab-code     { background: var(--surface-code);     border-radius: 23px 23px 0 0; }
  .panel-tab-cv       { background: var(--surface-component);border-radius: 23px 23px 0 0; }

  .tab-lockup { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .tab-icon { display: block; flex-shrink: 0; }
  .tab-title { font-family: 'Barlow', sans-serif; font-size: 16px; font-weight: 500; color: var(--text-primary); line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tab-title strong { font-weight: 700; }
  .tab-count { font-size: 13px; color: var(--text-muted); flex-shrink: 0; margin-left: 8px; }

  /* ─── Agent panel placeholder content ─── */
  .panel-agent-icon { width: 40px; height: 40px; opacity: 0.25; }
  .panel-agent-text { font-size: 13px; color: var(--text-muted); font-family: 'Barlow', sans-serif; }

  /* ─── Code panel (mock IDE) ─── */
  .code-ide-layout {
    display: flex;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .code-tree {
    width: 260px;
    min-width: 260px;
    flex-shrink: 0;
    overflow-y: auto;
    overflow-x: hidden;
    background: #1E1E1E;
    border-right: 1px solid rgba(255,255,255,0.06);
    padding: 12px 14px 10px;
    font-family: 'Barlow', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    line-height: 1.7;
  }
  .code-tree .tree-group { font-weight: 600; color: rgba(255,255,255,0.75); margin-top: 4px; }
  .code-tree .tree-file { padding-left: 14px; color: rgba(255,255,255,0.55); }
  .code-tree .tree-file.active { color: var(--brand-cyan-bright); }
  .code-tree .tree-file.clickable { cursor: pointer; }
  .code-tree .tree-file.clickable:hover { color: rgba(255,255,255,0.9); }
  .code-tree .tree-file.clickable.active:hover { color: var(--brand-cyan-hover); }
  .code-tree .tree-file,
  .code-tree .tree-group {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .code-editor {
    flex: 1;
    min-width: 0;
    overflow: auto;
    padding: 12px 14px;
    font-family: ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace;
    font-size: 11px;
    line-height: 1.6;
    color: rgba(255,255,255,0.75);
    white-space: pre;
  }
  .code-editor .cm-kw { color: #c084fc; }
  .code-editor .cm-ty { color: #7dd3fc; }
  .code-editor .cm-fn { color: #86efac; }
  .code-editor .cm-nm { color: #fde68a; }
  .code-editor .cm-cm { color: rgba(255,255,255,0.35); font-style: italic; }
  .code-editor .cm-st { color: #fca5a5; }

  /* ─── Elements Panel scroll / controls ─── */
  .panel-scroll { flex: 1; overflow-y: auto; padding: 8px 8px; }
  .panel-scroll::-webkit-scrollbar { width: 4px; }
  .panel-scroll::-webkit-scrollbar-track { background: transparent; }
  .panel-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* ─── Element Rows ─── */
  .el-row {
    border-radius: 4px;
    padding: 7px 10px;
    margin-bottom: 5px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    gap: 6px;
    transition: opacity 0.15s ease, outline 0.15s ease;
    outline: 2px solid transparent;
    outline-offset: 1px;
    user-select: none;
    -webkit-user-select: none;
  }
  .el-row.placed { background: linear-gradient(to right, var(--brand-cyan), var(--brand-cyan-deep)); }
  .el-row.unplaced { background: linear-gradient(to right, var(--gray-btn-light), var(--gray-btn-dark)); opacity: 0.65; }
  .el-row.selected { background: linear-gradient(to right, var(--brand-blue), var(--brand-blue-deep)); outline-color: var(--brand-cyan-highlight); }
  .el-row:active { transform: scale(0.98); }

  .el-row-info { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .el-subtype { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; opacity: 0.75; }
  .el-subtype.shape { color: #a78bfa; }
  .el-subtype.information { color: #22d3ee; }
  .el-subtype.widget { color: #fbbf24; }
  .el-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .el-dot { color: var(--brand-cyan-bright); margin-right: 3px; }
  .el-chevron { font-size: 13px; opacity: 0.6; flex-shrink: 0; letter-spacing: -1px; }
  .el-hint { font-size: 9px; color: rgba(255,255,255,0.45); flex-shrink: 0; }

  .el-nested { margin-left: 14px; }

  /* ─── Expanded Params ─── */
  .el-params {
    margin: 0 0 5px 6px;
    padding: 7px 9px;
    background: rgba(255,255,255,0.035);
    border-radius: 4px; border-left: 2px solid rgba(0,195,255,0.2);
    font-size: 11px; font-family: 'Barlow', monospace;
    color: rgba(255,255,255,0.55); line-height: 1.7;
    animation: fadeSlide 0.2s ease-out;
  }
  .param-heading { font-size: 9px; font-weight: 600; color: var(--brand-cyan-bright); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 5px; margin-bottom: 1px; font-family: 'Barlow', sans-serif; }
  .param-heading:first-child { margin-top: 0; }

  /* ─── Styled Parameter Rows ─── */
  .el-styled-params {
    margin: 0 0 5px 6px;
    animation: fadeSlide 0.2s ease-out;
  }
  .param-row { margin-bottom: 8px; }
  .param-row:last-child { margin-bottom: 0; }
  .param-header {
    background: linear-gradient(to right, var(--brand-blue), var(--brand-blue-deep));
    border-radius: 4px;
    padding: 7px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .param-header .el-chevron {
    font-size: 13px;
    opacity: 0.6;
    letter-spacing: -1px;
  }
  .param-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  .param-badge {
    background: rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 6px 12px;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .param-color-swatch {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  @keyframes fadeSlide { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  /* ─── Controls strip ─── */
  .controls {
    padding: 8px 10px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; flex-direction: column; gap: 7px;
  }
  .ctrl-row { display: flex; gap: 8px; align-items: center; }
  .ctrl-label { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .ctrl-label input { accent-color: var(--brand-cyan); width: 13px; height: 13px; }
  .scale-btns { display: flex; gap: 3px; align-items: center; }
  .scale-label { font-size: 13px; color: var(--text-muted); margin-right: 4px; }
  .scale-btn {
    width: 26px; height: 22px; border-radius: 4px; border: none;
    color: var(--text-primary); font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: 'Barlow', sans-serif;
  }
  .scale-btn.active { background: var(--brand-cyan-pill); }
  .scale-btn.inactive { background: rgba(255,255,255,0.1); }

  .btn-place-all {
    width: 100%; height: 28px; border-radius: 4px;
    border: 1px solid var(--brand-cyan-bright); background: transparent;
    color: var(--brand-cyan-bright); font-size: 11px; font-weight: 600;
    cursor: pointer; font-family: 'Barlow', sans-serif;
    transition: background 0.15s;
  }
  .btn-place-all:hover { background: rgba(0,195,255,0.08); }
  .btn-place-all:active { background: rgba(0,195,255,0.15); }

  .instruction {
    font-size: 11px; color: var(--text-muted); padding: 6px 8px;
    background: rgba(255,255,255,0.025); border-radius: 5px;
    line-height: 1.5; margin-bottom: 8px;
  }

  /* ─── Component panel body (canvas) ─── */
  .canvas-body {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 24px; overflow: auto;
  }
  .canvas-empty { text-align: center; color: var(--text-muted); }
  .canvas-empty-icon { font-size: 40px; opacity: 0.25; margin-bottom: 10px; }
  .canvas-empty-text { font-size: 13px; }

  /* ─── Canvas Components ─── */
  .cv-wrap { position: relative; }
  .cv-label {
    position: absolute; top: -24px; left: 0;
    font-size: 13px; font-weight: 600; color: var(--brand-cyan-highlight);
    background: rgba(0,0,0,0.55); padding: 1px 7px; border-radius: 3px;
    white-space: nowrap; pointer-events: none;
    animation: fadeSlide 0.2s ease-out;
  }
  .cv-size-badge {
    position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: var(--text-muted); font-family: monospace;
    background: rgba(0,0,0,0.45); padding: 1px 5px; border-radius: 3px;
    white-space: nowrap; pointer-events: none;
  }

  .cv-container {
    position: relative; border-radius: 16px; overflow: hidden;
    transition: outline 0.15s ease; cursor: pointer;
    outline: 2px solid transparent; outline-offset: 2px;
  }
  .cv-container.selected { outline-color: var(--brand-cyan-highlight); }

  .cv-child {
    position: relative; cursor: pointer;
    outline: 2px solid transparent; outline-offset: 1px;
    transition: outline 0.12s ease;
  }
  .cv-child.selected { outline-color: var(--brand-cyan-highlight); }

  .cv-image { width: 100%; display: block; object-fit: cover; border-radius: 10px; }
  .cv-title { font-family: 'Barlow', sans-serif; font-weight: 600; line-height: 1.25; letter-spacing: -0.3px; }
  .cv-body { font-family: 'Barlow', sans-serif; font-weight: 400; line-height: 1.5; color: rgba(255,255,255,0.75); }
  .cv-label-text { font-family: 'Barlow', sans-serif; font-weight: 500; line-height: 1.3; letter-spacing: 0.2px; }
  .cv-icon-row { display: flex; align-items: center; }

  /* ─── Padding overlay ─── */
  .pad-overlay { position: absolute; pointer-events: none; z-index: 10; background: rgba(0,195,255,0.1); }
  .pad-overlay.top { top: 0; left: 0; right: 0; border-bottom: 1px dashed rgba(0,195,255,0.35); }
  .pad-overlay.bottom { bottom: 0; left: 0; right: 0; border-top: 1px dashed rgba(0,195,255,0.35); }
  .pad-overlay.left { left: 0; border-right: 1px dashed rgba(0,195,255,0.35); }
  .pad-overlay.right { right: 0; border-left: 1px dashed rgba(0,195,255,0.35); }
  .pad-label {
    position: absolute; font-size: 8px; color: var(--brand-cyan-bright);
    font-family: monospace; pointer-events: none; z-index: 11;
  }

  /* ─── Spacing indicator ─── */
  .spacing-ind {
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .spacing-line {
    position: absolute; left: 50%; width: 1px;
    background: rgba(244,114,182,0.35); top: 0; bottom: 0;
    transform: translateX(-50%); pointer-events: none;
  }
  .spacing-val {
    font-size: 8px; color: var(--pink-spacing); font-family: monospace;
    background: #1E1E2E; padding: 0 3px; position: relative; z-index: 1;
  }

  /* ─── Legend ─── */
  .legend {
    padding: 8px 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    animation: fadeSlide 0.3s ease-out;
  }
  .legend-item { font-size: 9px; display: flex; align-items: center; gap: 4px; }
  .legend-swatch { width: 9px; height: 9px; display: inline-block; }
  .legend-pad { background: rgba(0,195,255,0.12); border: 1px dashed rgba(0,195,255,0.4); }
  .legend-space { height: 1px !important; width: 9px; background: var(--pink-spacing); }
  .legend-hint { font-size: 9px; color: rgba(255,255,255,0.25); }

  /* ─── Resize Handles ─── */
  .resize-handle {
    width: 12px;
    min-width: 12px;
    margin-left: -6px;
    margin-right: -6px;
    cursor: col-resize;
    display: flex;
    align-items: stretch;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  /* ─── Mobile ─── */
  @media (max-width: 640px) {
    .panels-wrap { flex-direction: column; }
    .panel { width: 100% !important; min-width: 0 !important; }
    .panel-elements { max-height: 45vh; }
    .panel-component { min-width: 0; }
    .canvas-body { padding: 16px; }
    .mode-pill { width: 42px; height: 22px; border-radius: 22px; }
    .mode-bar { height: 38px; min-height: 38px; padding: 0 8px; }
    .wordmark-el, .wordmark-de { font-size: 22px; }
    .resize-handle { display: none !important; }
  }
</style>
</head>

// Panel rendering order (fixed, left→right). Must match the DOM.
const PANEL_ORDER = ['agent', 'elements', 'code', 'component'];
const PANEL_ELEMENTS = {
  agent: 'panelAgent',
  elements: 'panelElements',
  code: 'panelCode',
  component: 'panelComponent'
};

let state = {
  selected: null,
  scale: 1,
  expanded: {},
  panels: {
    agent: false,
    elements: true,
    code: false,
    component: true
  },
  panelWidths: {}
};

const PANEL_CONSTRAINTS = {
  agent:     { min: 200, max: 400 },
  elements:  { min: 220, max: 480 },
  code:      { min: 520, max: 800 },
  component: { min: 400, max: Infinity }
};

function togglePanel(panel) {
  if (panel === 'component') return; // Component is always visible
  const openCount = Object.values(state.panels).filter(v => v).length;
  if (state.panels[panel] && openCount <= 1) return; // at least one must stay open
  state.panels[panel] = !state.panels[panel];
  render();
}

function getComp(id) { return COMPONENTS.find(c=>c.id===id); }
function isPlaced(id) { return getComp(id).placed; }
function placedChildren() { return COMPONENTS.filter(c=>c.id!=='container'&&c.placed); }
function allPlaced() { return COMPONENTS.every(c=>c.placed); }

function placeComp(id) {
  getComp(id).placed = true;
  state.selected = id;
  render();
}

function placeAll() {
  PLACE_ORDER.forEach(id => { getComp(id).placed = true; });
  state.selected = 'container';
  render();
}

function selectComp(id) {
  if (arguments.length === 0) return;
  state.selected = id;
  render();
}

function toggleExpand(id) {
  state.expanded[id] = !state.expanded[id];
  render();
}

function setScale(s) {
  state.scale = s;
  render();
}

// ─── Render ───
function render() {
  renderPanels();
  renderElements();
  renderCanvas();
  renderControls();
  renderCodeTab();
  renderCodePanel();
}

function renderPanels() {
  // Pills reflect open/closed state
  document.querySelectorAll('.mode-pill[data-panel]').forEach(p => {
    const isOpen = !!state.panels[p.dataset.panel];
    p.className = 'mode-pill ' + (isOpen ? 'active' : 'inactive');
  });
  // Show/hide panel containers and apply custom widths
  PANEL_ORDER.forEach(name => {
    const el = document.getElementById(PANEL_ELEMENTS[name]);
    if (!el) return;
    el.style.display = state.panels[name] ? 'flex' : 'none';
    if (name !== 'component') {
      if (state.panelWidths[name] != null) {
        el.style.width = state.panelWidths[name] + 'px';
      } else {
        el.style.width = '';
      }
    }
  });
  renderResizeHandles();
}

function renderResizeHandles() {
  const wrap = document.querySelector('.panels-wrap');
  // Remove any existing handles
  wrap.querySelectorAll('.resize-handle').forEach(h => h.remove());

  // Find open panels in DOM order and insert a handle before each one
  // except the first.
  const openPanels = PANEL_ORDER.filter(n => state.panels[n]);
  for (let i = 1; i < openPanels.length; i++) {
    const left = openPanels[i - 1];
    const right = openPanels[i];
    const rightEl = document.getElementById(PANEL_ELEMENTS[right]);
    if (!rightEl) continue;
    const handle = document.createElement('div');
    handle.className = 'resize-handle';
    handle.dataset.left = left;
    handle.dataset.right = right;
    attachResize(handle);
    wrap.insertBefore(handle, rightEl);
  }
}

function attachResize(handle) {
  const onDown = (clientX, isTouch, ev) => {
    const left = handle.dataset.left;
    const right = handle.dataset.right;
    const leftEl = document.getElementById(PANEL_ELEMENTS[left]);
    const rightEl = document.getElementById(PANEL_ELEMENTS[right]);
    if (!leftEl || !rightEl) return;
    const startX = clientX;
    const startLeftW = leftEl.getBoundingClientRect().width;
    const startRightW = rightEl.getBoundingClientRect().width;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    const leftC = PANEL_CONSTRAINTS[left];
    const rightC = PANEL_CONSTRAINTS[right];

    const move = (cx) => {
      let delta = cx - startX;
      // Clamp delta so neither panel violates its constraints
      let newLeft = startLeftW + delta;
      let newRight = startRightW - delta;
      if (newLeft < leftC.min)  { delta = leftC.min - startLeftW; }
      if (newLeft > leftC.max)  { delta = leftC.max - startLeftW; }
      newRight = startRightW - delta;
      if (newRight < rightC.min) { delta = startRightW - rightC.min; }
      if (newRight > rightC.max) { delta = startRightW - rightC.max; }
      newLeft = startLeftW + delta;
      newRight = startRightW - delta;

      // Component panel is flex:1 — don't set width, just set the other side.
      if (left !== 'component') {
        state.panelWidths[left] = newLeft;
        leftEl.style.width = newLeft + 'px';
      }
      if (right !== 'component') {
        state.panelWidths[right] = newRight;
        rightEl.style.width = newRight + 'px';
      }
    };

    const onMouseMove = (e) => { e.preventDefault(); move(e.clientX); };
    const onMouseUp = () => {
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
    };
    const onTouchMove = (e) => { if (e.touches[0]) { e.preventDefault(); move(e.touches[0].clientX); } };
    const onTouchEnd = () => {
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('touchmove', onTouchMove);
      document.removeEventListener('touchend', onTouchEnd);
    };

    if (isTouch) {
      document.addEventListener('touchmove', onTouchMove, { passive: false });
      document.addEventListener('touchend', onTouchEnd);
    } else {
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    }
    if (ev) ev.preventDefault();
  };
  handle.addEventListener('mousedown', (e) => onDown(e.clientX, false, e));
  handle.addEventListener('touchstart', (e) => {
    if (e.touches[0]) onDown(e.touches[0].clientX, true, e);
  }, { passive: false });
}

function renderCodeTab() {
  const sel = state.selected ? getComp(state.selected) : getComp('container');
  const nameEl = document.getElementById('codeTabName');
  if (nameEl) nameEl.textContent = (sel && sel.name) || 'Card Container';
}

<span class="cm-kw">import</span> <span class="cm-ty">SwiftUI</span>

<span class="cm-kw">struct</span> <span class="cm-ty">CardDescription</span><span class="cm-kw">:</span> <span class="cm-ty">View</span> {
    <span class="cm-kw">var</span> body<span class="cm-kw">:</span> <span class="cm-kw">some</span> <span class="cm-ty">View</span> {
        <span class="cm-ty">Text</span>(<span class="cm-st">"A breathtaking alpine landscape at golden hour. Perfect for adventurers seeking serenity."</span>)
            .font(.body)
            .foregroundColor(.white.opacity(<span class="cm-nm">0.75</span>))
            .frame(maxWidth<span class="cm-kw">:</span> .infinity, alignment<span class="cm-kw">:</span> .leading)
    }
}`
  },
  label: {
    tree: [
      { group: 'Components/', files: [ { name: 'CategoryLabel.swift', active: true } ] }
    ],
    code:
`<span class="cm-cm">// CategoryLabel.swift</span>
<span class="cm-kw">import</span> <span class="cm-ty">SwiftUI</span>

<span class="cm-kw">struct</span> <span class="cm-ty">CategoryLabel</span><span class="cm-kw">:</span> <span class="cm-ty">View</span> {
    <span class="cm-kw">var</span> body<span class="cm-kw">:</span> <span class="cm-kw">some</span> <span class="cm-ty">View</span> {
        <span class="cm-ty">Text</span>(<span class="cm-st">"ADVENTURE · NATURE"</span>)
            .font(.caption)
            .fontWeight(.medium)
            .foregroundColor(.white.opacity(<span class="cm-nm">0.5</span>))

            .frame(maxWidth<span class="cm-kw">:</span> .infinity, alignment<span class="cm-kw">:</span> .leading)

  },
  'icon-row': {
    tree: [
      { group: 'Components/', files: [ { name: 'ActionBar.swift', active: true } ] },
      { group: 'Assets/Icons/', files: [
        { name: 'heart.svg' },
        { name: 'share.svg' },
        { name: 'bookmark.svg' }
      ]}
    ],
    code:
`<span class="cm-cm">// ActionBar.swift</span>
<span class="cm-kw">import</span> <span class="cm-ty">SwiftUI</span>

<span class="cm-kw">struct</span> <span class="cm-ty">ActionBar</span><span class="cm-kw">:</span> <span class="cm-ty">View</span> {
    <span class="cm-kw">var</span> body<span class="cm-kw">:</span> <span class="cm-kw">some</span> <span class="cm-ty">View</span> {
        <span class="cm-ty">HStack</span>(spacing<span class="cm-kw">:</span> <span class="cm-nm">16</span>) {
            <span class="cm-ty">Image</span>(systemName<span class="cm-kw">:</span> <span class="cm-st">"heart"</span>)
            <span class="cm-ty">Image</span>(systemName<span class="cm-kw">:</span> <span class="cm-st">"square.and.arrow.up"</span>)
            <span class="cm-ty">Image</span>(systemName<span class="cm-kw">:</span> <span class="cm-st">"bookmark"</span>)
        }
        .foregroundColor(.white.opacity(<span class="cm-nm">0.55</span>))
        .padding(.top, <span class="cm-nm">8</span>)

};

const FILE_TO_COMP = {
  'CardContainer.swift': 'container',
  'HeroImage.swift': 'image',
  'CardTitle.swift': 'title',
  'CardDescription.swift': 'body',
  'CategoryLabel.swift': 'label',
  'ActionBar.swift': 'icon-row'
};

function renderCodePanel() {
  const treeEl = document.getElementById('codeTree');
  const editorEl = document.getElementById('codeEditor');
  if (!treeEl || !editorEl) return;
  const key = state.selected && CODE_VIEWS[state.selected] ? state.selected : 'container';
  const view = CODE_VIEWS[key];
  let treeHtml = '';
  view.tree.forEach(group => {
    treeHtml += `<div class="tree-group">▾ ${group.group}</div>`;
    group.files.forEach(f => {
      const compId = FILE_TO_COMP[f.name];
      const classes = 'tree-file' + (f.active ? ' active' : '') + (compId ? ' clickable' : '');
      const click = compId ? ` onclick="selectComp('${compId}')"` : '';
      treeHtml += `<div class="${classes}"${click}>▸ ${f.name}</div>`;
    });
  });
  treeEl.innerHTML = treeHtml;
  editorEl.innerHTML = view.code;
}

function renderControls() {
  document.getElementById('placeCount').textContent = COMPONENTS.filter(c=>c.placed).length + '/6 placed';
  document.getElementById('btnPlaceAll').style.display = allPlaced() ? 'none' : '';
  document.getElementById('legend').style.display = allPlaced() ? '' : 'none';
  document.querySelectorAll('.scale-btn').forEach(b => {
    b.className = 'scale-btn ' + (parseFloat(b.dataset.s) === state.scale ? 'active' : 'inactive');
  });
}

// ─── Elements Panel ───
function renderElements() {
  const el = document.getElementById('elPanel');
  let html = '';

  // Container row
  html += renderRow(getComp('container'), 0);

  // Placed children nested under container
  if (isPlaced('container')) {
    placedChildren().forEach(c => { html += renderRow(c, 1); });
  }

  // Unplaced components
  COMPONENTS.filter(c=>c.id!=='container'&&!c.placed).forEach(c => { html += renderRow(c, 0); });

  el.innerHTML = html;
}

function renderRow(comp, depth) {
  const placed = comp.placed;
  const sel = state.selected === comp.id;
  const exp = state.expanded[comp.id];
  const cls = placed ? (sel ? 'selected' : 'placed') : 'unplaced';
  const subtypeCls = comp.subtype;
  const icons = { shape:'◻', information:'ℹ', widget:'⚡' };
  const dot = placed ? '<span class="el-dot">•</span>' : '';
  const hint = !placed ? '<span class="el-hint">tap to place</span>' : '';
  const chevron = exp ? '^^^' : '>>>';

  const clickAction = placed
    ? `selectComp('${comp.id}'); toggleExpand('${comp.id}')`
    : `placeComp('${comp.id}')`;

  let html = `<div class="${depth?'el-nested':''}">`;
  html += `<div class="el-row ${cls}" onclick="event.stopPropagation(); ${clickAction}">`;
  html += `<div class="el-row-info">`;
  html += `<span class="el-subtype ${subtypeCls}">${icons[comp.subtype]} ${comp.subtype}</span>`;
  html += `<span class="el-name">${dot}${comp.name}</span>`;
  html += `</div>`;
  html += `<div style="display:flex;align-items:center;gap:5px">${hint}<span class="el-chevron">${chevron}</span></div>`;
  html += `</div>`;

  // Expanded params
  if (exp && placed) {
    html += renderParams(comp);
  }

  html += `</div>`;
  return html;
}

function renderParams(comp) {
  if (comp.id === 'container') return renderContainerParams(comp);
  return renderStyledParams(comp);
}

function renderContainerParams(comp) {
  const p = comp.params;
  const sw = (v) => typeof v === 'number' ? v+'pt' : v;
  let h = '<div class="el-params">';
  h += '<div class="param-heading">Structure</div>';
  h += `size: ${sw(p.size.w)} × ${sw(p.size.h)}<br>`;
  h += `padding: ${p.padding.top}/${p.padding.right}/${p.padding.bottom}/${p.padding.left}pt<br>`;
  h += `cornerRadius: ${p.cornerRadius}pt<br>`;
  if (p.spacing !== undefined) h += `spacing: ${p.spacing}pt<br>`;
  h += `clip: ${p.clip?'on':'off'}<br>`;
  h += `scalesWithContent: ${p.scalesWithContent?'on':'off'}`;
  h += '<div class="param-heading">Content</div>';
  h += `color: ${p.color}<br>`;
  if (p.text) h += `text.styleRole: ${p.text.styleRole}<br>text.content: "${p.text.content.slice(0,35)}…"<br>`;
  if (p.image) h += `image.fit: ${p.image.fit}<br>`;
  if (comp.isIconRow) h += `icons: Heart, Share, Bookmark<br>`;
  h += '</div>';
  return h;
}

const STYLED_PARAMS = {
  image: [
    { name: 'Size', badges: ['fill', '180h'] },
    { name: 'Image', badges: ['Fill', 'mountain-vista.jpg'] },
    { name: 'Corner Radius', badges: ['10'] }
  ],
  title: [
    { name: 'Text', badges: ['Title', '"Mountain Vista"'] },
    { name: 'Size', badges: ['hug', 'hug'] }
  ],
  body: [
    { name: 'Text', badges: ['Body', '"A breathtaking alpine…"'] },
    { name: 'Max Lines', badges: ['unlimited'] }
  ],
  label: [
    { name: 'Text', badges: ['Label', '"ADVENTURE · NATURE"'] },
    { name: 'Color', badges: [{ swatch: 'rgba(255,255,255,0.5)', text: '50% White' }] }
  ],
  'icon-row': [
    { name: 'Direction', badges: ['Horizontal'] },
    { name: 'Spacing', badges: ['16pt'] },
    { name: 'Children', badges: ['Heart', 'Share', 'Bookmark'] }
  ]
};

function renderStyledParams(comp) {
  const rows = STYLED_PARAMS[comp.id] || [];
  let h = '<div class="el-styled-params">';
  rows.forEach(row => {
    h += '<div class="param-row">';
    h += `<div class="param-header"><span>${row.name}</span><span class="el-chevron">>>></span></div>`;
    h += '<div class="param-badges">';
    row.badges.forEach(b => {
      if (typeof b === 'string') {
        h += `<div class="param-badge">${b}</div>`;
      } else {
        h += `<div class="param-badge"><span class="param-color-swatch" style="background:${b.swatch}"></span>${b.text}</div>`;
      }
    });
    h += '</div></div>';
  });
  h += '</div>';
  return h;
}

// ─── Canvas ───
function renderCanvas() {
  const cv = document.getElementById('canvasBody');
  const s = state.scale;
  const showPad = document.getElementById('chkPad').checked;
  const showSpace = document.getElementById('chkSpace').checked;

  if (!isPlaced('container')) {
    cv.innerHTML = '<div class="canvas-empty"><div class="canvas-empty-icon">◻</div><div class="canvas-empty-text">Place the Container to start building</div></div>';
    return;
  }

  const container = getComp('container');
  const cp = container.params;
  const children = placedChildren();
  const sel = state.selected;

  let html = '<div class="cv-wrap">';

  // Selection label
  if (sel) {
    const selComp = getComp(sel);
    if (selComp) html += `<div class="cv-label">${selComp.name}</div>`;
  }

  // Container
  html += `<div class="cv-container ${sel==='container'?'selected':''}" onclick="event.stopPropagation(); selectComp('container')" style="
    width:${cp.size.w*s}px;
    background:${cp.color};
    border-radius:${cp.cornerRadius*s}px;
    padding:${cp.padding.top*s}px ${cp.padding.right*s}px ${cp.padding.bottom*s}px ${cp.padding.left*s}px;
    display:flex; flex-direction:column; gap:${showSpace?0:cp.spacing*s}px;
  ">`;

  // Padding overlay on container
  if (showPad && sel === 'container') {
    html += paddingOverlay(cp.padding, s);
  }

  if (children.length === 0) {
    html += '<div style="border:2px dashed var(--gray-border);border-radius:8px;padding:24px;text-align:center;color:var(--text-muted);font-size:12px">Drop components here</div>';
  }

  children.forEach((child, i) => {
    html += renderCanvasChild(child, s, showPad, showSpace);
    if (showSpace && i < children.length - 1) {
      html += `<div class="spacing-ind" style="height:${cp.spacing*s}px"><div class="spacing-line"></div><span class="spacing-val">${Math.round(cp.spacing*s)}pt</span></div>`;
    }
  });

  html += '</div>'; // container

  // Size badge
  html += `<div class="cv-size-badge">${Math.round(cp.size.w*s)}pt × auto</div>`;
  html += '</div>'; // cv-wrap

  cv.innerHTML = html;
}

function renderCanvasChild(comp, s, showPad, showSpace) {
  const p = comp.params;
  const sel = state.selected === comp.id;
  let html = '';

  html += `<div class="cv-child ${sel?'selected':''}" onclick="event.stopPropagation(); selectComp('${comp.id}')" style="position:relative;">`;

  // Padding overlay
  if (showPad && sel && (p.padding.top > 0 || p.padding.right > 0 || p.padding.bottom > 0 || p.padding.left > 0)) {
    html += paddingOverlay(p.padding, s);
  }

  // Image
  if (p.image) {
    html += `<img class="cv-image" src="${p.image.src}" alt="${comp.name}" style="height:${p.size.h*s}px; border-radius:${p.cornerRadius*s}px;" loading="lazy">`;
  }

  // Text
  if (p.text) {
    const ts = TEXT_STYLES[p.text.styleRole] || TEXT_STYLES.Body;
    const cls = p.text.styleRole === 'Title' ? 'cv-title' : p.text.styleRole === 'Label' ? 'cv-label-text' : 'cv-body';
    const textColor = p.color !== 'transparent' ? `color:${p.color};` : '';
    html += `<div class="${cls}" style="font-size:${ts.size*s}px;font-weight:${ts.weight};line-height:${ts.lh};letter-spacing:${ts.ls}px;${textColor}">${p.text.content}</div>`;
  }

  // Icon row
  if (comp.isIconRow) {
    const iconSize = 18 * s;
    const gap = p.spacing * s;
    html += `<div class="cv-icon-row" style="gap:${gap}px; padding:${p.padding.top*s}px ${p.padding.right*s}px ${p.padding.bottom*s}px ${p.padding.left*s}px;">`;
    // Heart
    html += `<svg width="${iconSize}" height="${iconSize}" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
    // Share
    html += `<svg width="${iconSize}" height="${iconSize}" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>`;
    // Bookmark
    html += `<svg width="${iconSize}" height="${iconSize}" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function paddingOverlay(pad, s) {
  let h = '';
  if (pad.top > 0) {
    h += `<div class="pad-overlay top" style="height:${pad.top*s}px"></div>`;
    h += `<div class="pad-label" style="top:1px;left:50%;transform:translateX(-50%)">${pad.top}pt</div>`;
  }
  if (pad.bottom > 0) {
    h += `<div class="pad-overlay bottom" style="height:${pad.bottom*s}px"></div>`;
  }
  if (pad.left > 0) {
    h += `<div class="pad-overlay left" style="top:${pad.top*s}px;bottom:${pad.bottom*s}px;width:${pad.left*s}px"></div>`;
    h += `<div class="pad-label" style="left:1px;top:50%;transform:translateY(-50%) rotate(-90deg)">${pad.left}pt</div>`;
  }
  if (pad.right > 0) {
    h += `<div class="pad-overlay right" style="top:${pad.top*s}px;bottom:${pad.bottom*s}px;width:${pad.right*s}px"></div>`;
  }
  return h;
}

// ─── Init ───
render();
</script>
</body>
</html>
